services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: booking_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234
    ports:
      - "5433:5432"
    volumes:
      - booking_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d booking_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT: 3000
      DATABASE_URL: postgresql://postgres:1234@postgres:5432/booking_db
      JWT_SECRET: super-secret-key
      JWT_EXPIRES_IN: 1d
      JWT_REFRESH_SECRET: super-refresh-secret-key
      JWT_REFRESH_EXPIRES_IN: 7d
      SWAGGER_PATH: docs
    ports:
      - "3000:3000"

volumes:
  booking_pgdata:
